apiVersion: distribution.sealos.io/v1alpha1
kind: LocalPatchPolicy
metadata:
  name: fixture-local-policy
spec:
  scope: clusterLocal
  forbiddenExactPaths:
    - status
    - spec.selector
  forbiddenMetadataKeys:
    - uid
    - resourceVersion
    - generation
    - creationTimestamp
    - managedFields
    - ownerReferences
    - finalizers
    - generateName
    - selfLink
    - deletionTimestamp
    - deletionGracePeriodSeconds
  forbiddenContainerFields:
    - image
  kindRules:
    - kind: ConfigMap
      allowedPrefixes:
        - data
