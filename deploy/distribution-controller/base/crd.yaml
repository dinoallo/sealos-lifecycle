apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: distributiontargets.distribution.sealos.io
spec:
  group: distribution.sealos.io
  names:
    kind: DistributionTarget
    listKind: DistributionTargetList
    plural: distributiontargets
    shortNames:
      - disttarget
    singular: distributiontarget
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Ready
          type: string
          jsonPath: .status.conditions[?(@.type=="Ready")].status
        - name: Revision
          type: string
          jsonPath: .status.lastResult.revision
        - name: Channel
          type: string
          jsonPath: .status.lastResult.channel
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              properties:
                clusterName:
                  type: string
                  description: Cluster state name reconciled by the agent.
                bomPath:
                  type: string
                  description: Local path to a BOM document visible inside the controller pod.
                releaseChannelPath:
                  type: string
                  description: Local path to a ReleaseChannel document visible inside the controller pod.
                releaseSource:
                  type: string
                  description: Release metadata source URL or directory used with releaseLine and channel.
                releaseLine:
                  type: string
                  description: Distribution line resolved from releaseSource.
                channel:
                  type: string
                  enum:
                    - alpha
                    - beta
                    - stable
                  description: Release channel resolved from releaseSource.
                localRepoPath:
                  type: string
                  description: Local cluster repo used for render-time input bindings and local patches.
                localPatchRevision:
                  type: string
                  description: Optional local patch revision recorded in applied state.
                packageSources:
                  type: array
                  description: Local package source overrides, keyed by component name.
                  items:
                    type: object
                    required:
                      - component
                      - root
                    properties:
                      component:
                        type: string
                        minLength: 1
                      root:
                        type: string
                        minLength: 1
                cacheRoot:
                  type: string
                  description: Package cache root used while resolving component packages.
                kubeconfigPath:
                  type: string
                  description: Path to the admin kubeconfig inside the controller pod.
                hostRoot:
                  type: string
                  description: Host filesystem root used for host apply steps.
                rolloutPolicyRef:
                  type: object
                  description: Same-namespace DistributionRolloutPolicy used for durable rollout behavior.
                  required:
                    - name
                  properties:
                    name:
                      type: string
                      minLength: 1
                rolloutBatchSize:
                  type: integer
                  minimum: 0
                  description: Inline fallback maximum hosts processed per eligible host rollout batch; ignored when rolloutPolicyRef is set; 0 means all hosts.
                requeueAfter:
                  type: string
                  format: duration
                  description: Optional successful reconcile interval.
                retryBackoff:
                  type: string
                  format: duration
                  description: Optional failed reconcile retry interval; unset returns terminal errors to controller-runtime.
              oneOf:
                - required:
                    - bomPath
                  not:
                    anyOf:
                      - required:
                          - releaseChannelPath
                      - required:
                          - releaseSource
                      - required:
                          - releaseLine
                      - required:
                          - channel
                - required:
                    - releaseChannelPath
                  not:
                    anyOf:
                      - required:
                          - bomPath
                      - required:
                          - releaseSource
                      - required:
                          - releaseLine
                      - required:
                          - channel
                - required:
                    - releaseSource
                    - releaseLine
                    - channel
                  not:
                    anyOf:
                      - required:
                          - bomPath
                      - required:
                          - releaseChannelPath
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                phase:
                  type: string
                  enum:
                    - Succeeded
                    - Retrying
                    - PartiallyFailed
                    - Paused
                    - RollbackHold
                lastReconcileTime:
                  type: string
                  format: date-time
                lastResult:
                  type: object
                  properties:
                    clusterName:
                      type: string
                    bomName:
                      type: string
                    revision:
                      type: string
                    channel:
                      type: string
                    bundlePath:
                      type: string
                    desiredStateDigest:
                      type: string
                    appliedRevisionPath:
                      type: string
                retryCount:
                  type: integer
                  format: int64
                nextRetryTime:
                  type: string
                  format: date-time
                holdReason:
                  type: string
                lastDiagnostic:
                  type: object
                  properties:
                    type:
                      type: string
                    reason:
                      type: string
                    message:
                      type: string
                    time:
                      type: string
                      format: date-time
                conditions:
                  type: array
                  x-kubernetes-list-type: map
                  x-kubernetes-list-map-keys:
                    - type
                  items:
                    type: object
                    required:
                      - type
                      - status
                      - lastTransitionTime
                      - reason
                      - message
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                      observedGeneration:
                        type: integer
                        format: int64
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: distributionrolloutpolicies.distribution.sealos.io
spec:
  group: distribution.sealos.io
  names:
    kind: DistributionRolloutPolicy
    listKind: DistributionRolloutPolicyList
    plural: distributionrolloutpolicies
    shortNames:
      - distrollout
    singular: distributionrolloutpolicy
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: BatchSize
          type: integer
          jsonPath: .spec.strategy.batchSize
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              properties:
                strategy:
                  type: object
                  description: Durable rollout strategy used by referencing DistributionTarget objects.
                  properties:
                    batchSize:
                      type: integer
                      minimum: 0
                      description: Maximum hosts processed per eligible host rollout batch; 0 means all hosts.
                    canary:
                      type: object
                      description: First rollout batch settings used to limit initial blast radius.
                      properties:
                        batchSize:
                          type: integer
                          minimum: 0
                          description: Hosts processed in the first canary batch before normal rollout batches; 0 disables canary.
                    pause:
                      type: object
                      description: Rollout pause gates for manual operator approval.
                      properties:
                        afterCanary:
                          type: boolean
                          description: Pause after the canary batch completes instead of advancing to later rollout batches.
                    healthGate:
                      type: boolean
                      description: Run component healthcheck hooks after each eligible host rollout batch before advancing.
                    failureAction:
                      type: string
                      enum:
                        - Stop
                        - Rollback
                      description: Stop leaves the failed desired state recorded; Rollback re-applies the last successful rendered revision when apply fails.
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                conditions:
                  type: array
                  x-kubernetes-list-type: map
                  x-kubernetes-list-map-keys:
                    - type
                  items:
                    type: object
                    required:
                      - type
                      - status
                      - lastTransitionTime
                      - reason
                      - message
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                      observedGeneration:
                        type: integer
                        format: int64
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
