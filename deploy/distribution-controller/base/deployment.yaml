apiVersion: apps/v1
kind: Deployment
metadata:
  name: sealos-distribution-controller
  namespace: sealos-system
  labels:
    app.kubernetes.io/name: sealos-distribution-controller
    app.kubernetes.io/part-of: sealos
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sealos-distribution-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sealos-distribution-controller
        app.kubernetes.io/part-of: sealos
    spec:
      serviceAccountName: sealos-distribution-controller
      hostPID: true
      containers:
        - name: sealos-agent
          image: labring/sealos-agent:dev
          imagePullPolicy: IfNotPresent
          args:
            - --controller
            - --controller-namespace=sealos-system
            - --leader-elect
            - --leader-election-namespace=sealos-system
            - --metrics-bind-address=0
            - --health-probe-bind-address=:8081
            - --kubeconfig=/host/etc/kubernetes/admin.conf
            - --host-root=/host
          env:
            - name: PATH
              value: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/host/usr/local/sbin:/host/usr/local/bin:/host/usr/sbin:/host/usr/bin:/host/sbin:/host/bin
          securityContext:
            privileged: true
          ports:
            - name: health
              containerPort: 8081
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: host-root
              mountPath: /host
            - name: var-lib-sealos
              mountPath: /var/lib/sealos
            - name: run
              mountPath: /run
      volumes:
        - name: host-root
          hostPath:
            path: /
            type: Directory
        - name: var-lib-sealos
          hostPath:
            path: /var/lib/sealos
            type: DirectoryOrCreate
        - name: run
          hostPath:
            path: /run
            type: Directory
