apiVersion: v1
kind: ServiceAccount
metadata:
  name: sealos-distribution-controller
  namespace: sealos-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sealos-distribution-controller
  namespace: sealos-system
rules:
  - apiGroups:
      - distribution.sealos.io
    resources:
      - distributiontargets
      - distributionrolloutpolicies
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - distribution.sealos.io
    resources:
      - distributiontargets/status
    verbs:
      - get
      - patch
      - update
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - create
      - get
      - list
      - update
      - watch
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sealos-distribution-controller
  namespace: sealos-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: sealos-distribution-controller
subjects:
  - kind: ServiceAccount
    name: sealos-distribution-controller
    namespace: sealos-system
