apiVersion: apps/v1
kind: Deployment
metadata:
  name: sealos-distribution-controller
  namespace: sealos-system
  labels:
    distribution.sealos.io/install-profile: production-host-agent
  annotations:
    distribution.sealos.io/host-tool-contract: kubectl,systemctl,tar,sh
spec:
  template:
    metadata:
      labels:
        distribution.sealos.io/install-profile: production-host-agent
      annotations:
        distribution.sealos.io/host-tool-contract: kubectl,systemctl,tar,sh
    spec:
      nodeSelector:
        sealos.io/distribution-controller: "true"
      priorityClassName: system-cluster-critical
      initContainers:
        - name: host-tool-preflight
          image: labring/sealos-agent:dev
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
          args:
            - |
              missing=0
              for tool in kubectl systemctl tar sh; do
                if ! command -v "${tool}" >/dev/null 2>&1; then
                  echo "missing required host/controller tool: ${tool}" >&2
                  missing=1
                fi
              done
              if [ ! -r /host/etc/kubernetes/admin.conf ]; then
                echo "missing readable host admin kubeconfig: /host/etc/kubernetes/admin.conf" >&2
                missing=1
              fi
              if [ ! -d /var/lib/sealos ]; then
                echo "missing /var/lib/sealos runtime state directory" >&2
                missing=1
              fi
              exit "${missing}"
          env:
            - name: PATH
              value: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/host/usr/local/sbin:/host/usr/local/bin:/host/usr/sbin:/host/usr/bin:/host/sbin:/host/bin
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: host-root
              mountPath: /host
              readOnly: true
            - name: var-lib-sealos
              mountPath: /var/lib/sealos
              readOnly: true
            - name: run
              mountPath: /run
              readOnly: true
      containers:
        - name: sealos-agent
          imagePullPolicy: Always
          env:
            - name: SEALOS_DISTRIBUTION_CONTROLLER_PROFILE
              value: production-host-agent
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            privileged: true
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: true
