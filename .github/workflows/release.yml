name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # Common versions
  GO_VERSION: "1.25"
  DEFAULT_OWNER: "labring"

on:
  workflow_dispatch:
  push:
    tags:
      - "*"

jobs:
  releaser:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Golang with cache
        uses: magnetikonline/action-golang-cache@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install Dependencies
        run: |
          sudo apt update && sudo apt install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            libbtrfs-dev libgpgme-dev libdevmapper-dev \
            qemu-user-static binfmt-support

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          args: release --clean
          workdir: .
        env:
          USERNAME: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FURY_TOKEN: ${{ secrets.FURY_TOKEN }}

      - name: Render distribution controller bundle
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        env:
          DISTRIBUTION_CONTROLLER_IMAGE: ghcr.io/${{ github.repository_owner }}/sealos-agent:${{ github.ref_name }}
        run: make render-distribution-controller-bundle

      - name: Archive distribution controller bundle
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: tar -C dist -czf "dist/distribution-controller-${GITHUB_REF_NAME}.tar.gz" distribution-controller

      - name: Upload distribution controller bundle
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" "dist/distribution-controller-${GITHUB_REF_NAME}.tar.gz" --clobber
