name: Day 0 Multi-Node Acceptance

on:
  pull_request:
    paths:
      - ".github/workflows/day0_multi_node_acceptance.yml"
      - "cmd/sealos/cmd/**"
      - "pkg/distribution/**"
      - "scripts/poc/**"
      - "go.mod"
      - "go.sum"
      - "go.work"
      - "go.work.sum"
  workflow_dispatch:
    inputs:
      go_version:
        description: "Go version used for the acceptance tests"
        required: false
        default: "1.25"
        type: string

permissions:
  contents: read

concurrency:
  group: day0-multinode-acceptance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  acceptance:
    name: Multi-Node Render And Apply Contract
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      GO_VERSION: ${{ inputs.go_version || '1.25' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Golang with cache
        uses: magnetikonline/action-golang-cache@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install test dependencies
        run: sudo apt update && sudo apt install -y libgpgme-dev libbtrfs-dev libdevmapper-dev

      - name: Run multi-node Day 0 acceptance
        run: make verify-day0-multinode-acceptance
