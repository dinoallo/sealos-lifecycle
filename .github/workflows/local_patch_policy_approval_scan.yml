name: Local Patch Policy Approval Scan

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1"

permissions:
  contents: read

concurrency:
  group: local-patch-policy-approval-scan-${{ github.ref || github.run_id }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  scan-local-patch-policy-approvals:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Golang with cache
        uses: magnetikonline/action-golang-cache@v5
        with:
          go-version: "1.25"

      - name: Run local patch policy approval scan
        id: scan
        shell: bash
        env:
          REPORT_PATH: ${{ runner.temp }}/local-patch-policy-approval-scan.yaml
        run: |
          set +e
          make verify-local-patch-policy-approvals \
            APPROVAL_SCAN_ROOT="." \
            APPROVAL_EXPIRY_WARNING_DAYS="30" \
            FAIL_WHEN_APPROVAL_EXPIRES_SOON="1" > "${REPORT_PATH}"
          status=$?
          set -e
          echo "status=${status}" >> "${GITHUB_OUTPUT}"
          exit 0

      - name: Write local patch policy approval scan report
        if: ${{ always() }}
        shell: bash
        env:
          REPORT_PATH: ${{ runner.temp }}/local-patch-policy-approval-scan.yaml
        run: |
          {
            echo "## Local patch policy approval scan report"
            echo
            if [[ ! -f "${REPORT_PATH}" ]]; then
              echo "No report file was produced."
              exit 0
            fi
            echo '```yaml'
            cat "${REPORT_PATH}"
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Write local patch policy approval scan summary
        if: ${{ always() }}
        shell: bash
        env:
          REPORT_PATH: ${{ runner.temp }}/local-patch-policy-approval-scan.yaml
        run: |
          if [[ ! -f "${REPORT_PATH}" ]]; then
            {
              echo "## Approval scan"
              echo
              echo "- No report file was produced."
            } >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi

          go run ./scripts/local-patch-policy-approval-scan-summary --report "${REPORT_PATH}" >> "${GITHUB_STEP_SUMMARY}"

      - name: Fail on blocking approval scan findings
        if: ${{ steps.scan.outputs.status != '0' }}
        run: exit 1
